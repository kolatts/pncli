name: Deploy site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.claude/skills/**'
      - 'CHANGELOG.md'
      - 'copilot-instructions.md'
      - '.github/workflows/pages-deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: withastro/action@v3
        with:
          path: site
          node-version: 22
        env:
          PUBLIC_FEEDBACK_ENDPOINT: ${{ vars.PUBLIC_FEEDBACK_ENDPOINT }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY || '0x4AAAAAAC8hdd6wCVRVf8YH' }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
