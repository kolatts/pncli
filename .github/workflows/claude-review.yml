name: Claude Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip forks, skip non-claude bots (e.g. dependabot, renovate),
    # but allow claude-created PRs through for self-review
    if: |
      github.event.pull_request.head.repo.fork == false &&
      (
        !endsWith(github.event.pull_request.user.login, '[bot]') ||
        contains(github.event.pull_request.user.login, 'claude')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Claude Code Review
        uses: anthropics/claude-code-action@v1.0.93
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: claude
          track_progress: true
          classify_inline_comments: 'true'
          include_fix_links: 'true'
          plugin_marketplaces: |
            https://github.com/kolatts/claude-marketplace.git
          plugins: |
            sunny
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            **Before doing anything else, read and clean up stale Claude feedback:**
            1. Fetch all previous Claude comments on this PR and read them to retain context:
               gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments --jq '.[] | select(.user.login == "claude[bot]") | {id: .id, body: .body}'
            2. Note any issues or concerns raised in those previous comments — you will carry this context into your review.
            3. Delete each previous Claude comment by ID:
               gh api repos/${{ github.repository }}/issues/comments/<id> -X DELETE
               (repeat for every ID returned in step 1)
            4. Dismiss any previous Claude formal review on this PR.
            5. Resolve any outdated inline review comment threads from previous Claude reviews.

            **Now review the pull request:**

            Review this pull request for the @kolatts/pncli repository.
            Focus on:
            1. Code quality and correctness (TypeScript CLI in src/, C# Azure Functions in functions/)
            2. CLI UX (commander/inquirer usage, error messages, exit codes)
            3. Security (command injection, credential handling, prompt injection, auth gaps)
            4. Bugs and edge cases
            5. Adherence to existing patterns in the codebase

            Leave inline comments on specific lines and a top-level summary.
            Skip nitpicks; prioritize substantive feedback.

            **When you are done, submit a formal GitHub review using one of:**
            - `gh pr review ${{ github.event.pull_request.number }} --approve --body "..."` — if no substantive issues found
            - `gh pr review ${{ github.event.pull_request.number }} --request-changes --body "..."` — if there are blocking problems

            Do not leave the PR without a formal APPROVE or REQUEST_CHANGES review state.
          claude_args: |
            --model sonnet --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(gh api repos/*/issues/*/comments:*),Bash(gh api repos/*/issues/comments/*:*)"
